[tools]
go = "1.26.4"

[tasks.build]
run = "go build -buildvcs=false"

[tasks.dev]
depends = [
  "build",
]
run = [
  "sudo cp opt-eikana /usr/local/bin/",
  "sudo cp 2754github.opt-eikana.plist /Library/LaunchAgents/",
  "launchctl unload /Library/LaunchAgents/2754github.opt-eikana.plist 2>/dev/null || true",
  "launchctl load /Library/LaunchAgents/2754github.opt-eikana.plist",
]
